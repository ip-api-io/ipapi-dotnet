name: release

# Builds the NuGet package (.nupkg). On a v* tag it is also attached to a GitHub
# Release. Publishing to NuGet is a separate, later step — no tokens are used here.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - run: dotnet pack src/IpApiIo -c Release -o dist
      - uses: actions/upload-artifact@v4
        with:
          name: dotnet-package
          path: dist/*.nupkg
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/*.nupkg --title "$GITHUB_REF_NAME" --generate-notes \
            || gh release upload "$GITHUB_REF_NAME" dist/*.nupkg --clobber
